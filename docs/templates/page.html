{% include "header.html" %}
{% include "nav.html" %}
<div class="docs-container">
  {% include "sidebar.html" %}
  <main class="docs-main{% if not page.toc %} no-toc{% endif %}">
    <h1>{{ page.title }}</h1>
    {{ content }}
    <footer class="docs-footer">
      <span>MIT &middot; written in <a href="https://crystal-lang.org" target="_blank" rel="noopener">Crystal</a> &middot; built with <a href="https://hwaro.hahwul.com" target="_blank" rel="noopener">hwaro</a></span>
      <span><a href="https://github.com/hahwul/doma" target="_blank" rel="noopener">GitHub</a> &middot; <a href="https://github.com/hahwul/doma/edit/main/docs/content{{ page.url }}.md" target="_blank" rel="noopener">Edit this page</a></span>
    </footer>
  </main>
  {% if page.toc %}
  <aside class="docs-toc">
    <div class="toc-title">On this page</div>
    {{ toc }}
  </aside>
  {% endif %}
</div>
{% include "footer.html" %}
