name: CI
on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ci.yml
      - shard.yml
      - shard.lock
      - docker/Dockerfile
      - .dockerignore
      - "**/*.cr"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crystal-version: [1.19.0, 1.20.0]
    steps:
      - uses: actions/checkout@v6
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal-version }}
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - name: Install shards
        run: shards install
      - name: Build
        run: shards build

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crystal-version: [1.19.0, 1.20.0]
    steps:
      - uses: actions/checkout@v6
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal-version }}
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - name: Install shards
        run: shards install
      - name: Run specs
        run: crystal spec

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Ameba linter
        uses: crystal-ameba/github-action@master

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crystal-lang/install-crystal@v1
      - name: Check formatting
        run: crystal tool format --check

  build-docker:
    # Build the multi-arch image on every PR/push so a Dockerfile
    # regression doesn't first surface during a release publish run.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.arch }}
          push: false
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
