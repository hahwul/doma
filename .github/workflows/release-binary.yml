---
name: Build and Release Binaries
on:
  workflow_dispatch:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  build:
    name: Build Binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: ubuntu-24.04-arm
            platform: linux
          - os: macos-latest
            platform: macos
          - os: macos-15-intel
            platform: macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Install system dependencies (macOS)
        if: matrix.platform == 'macos'
        run: brew install sqlite
      - name: Install dependencies
        run: shards install
      - name: Inject slug/short variables
        uses: rlespinasse/github-slug-action@v5
      - name: Set architecture environment variable
        run: |
          if [ "$RUNNER_ARCH" == "X64" ]; then
            echo "ARCH=x86_64" >> $GITHUB_ENV
          elif [ "$RUNNER_ARCH" == "ARM64" ]; then
            echo "ARCH=arm64" >> $GITHUB_ENV
          else
            echo "ARCH=unknown" >> $GITHUB_ENV
          fi
      - if: matrix.platform == 'linux'
        name: Build binary (Linux)
        # Use Alpine/musl-based Crystal so the resulting binary is fully
        # static — no glibc/sqlite version pinning surprises on user systems.
        run: |
          mkdir -p build
          docker run --rm -v $(pwd):/doma -w /doma --entrypoint="" crystallang/crystal:1.20.0-alpine sh -c "
            apk add --no-cache yaml-dev sqlite-dev sqlite-static git curl &&
            shards install --release --no-debug --production &&
            mkdir -p build &&
            crystal build src/main.cr -o build/doma-${GITHUB_REF_SLUG}-linux-${ARCH} --release --no-debug --static
          "
      - if: matrix.platform == 'macos'
        name: Build binary (macOS)
        run: |
          mkdir -p build
          BIN="build/doma-${GITHUB_REF_SLUG}-osx-${ARCH}"
          crystal build src/main.cr \
            -o "$BIN" \
            --no-debug --release
          echo "== otool -L $BIN ==" && otool -L "$BIN"
          # The Homebrew formula (homebrew-doma) declares NO dependencies: doma
          # links only system libraries (system libsqlite3) plus statically
          # linked Crystal runtime libs. Fail the release if any Homebrew dylib
          # sneaks in (e.g. an EOL openssl@1.1) — that would break a
          # clean-machine `brew install`.
          EXTRA="$(otool -L "$BIN" \
            | grep -oE '/(opt/homebrew|usr/local)/(opt|Cellar)/[^/]+' \
            | sort -u || true)"
          if [ -n "$EXTRA" ]; then
            echo "::error::unexpected Homebrew dynamic deps (formula declares none):"
            echo "$EXTRA"; exit 1
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-${{ matrix.os }}-${{ env.ARCH }}
          path: build
      - if: startsWith(github.ref, 'refs/tags/')
        name: Upload to GitHub Releases
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
          file: build/*
