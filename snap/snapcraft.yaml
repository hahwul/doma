name: doma
base: core24
summary: Directory tag manager — put your directories on the cutting board.
description: |
  doma (도마) is a directory tag manager written in Crystal. Tag any path
  with one or more labels and recall, browse, or batch-execute commands
  across them — a single SQLite-backed CLI with optional fzf integration.

adopt-info: doma
grade: stable
confinement: strict
license: MIT

platforms:
  amd64:
    build-on: amd64
    build-for: amd64
  arm64:
    build-on: arm64
    build-for: arm64

apps:
  doma:
    command: bin/doma
    plugs:
      - home
      - removable-media
      - network

parts:
  doma:
    plugin: nil
    build-packages:
      - curl
      - ca-certificates
    override-build: |
      set -euo pipefail
      tag="$(curl -fsSL https://api.github.com/repos/hahwul/doma/releases/latest | grep -m1 '"tag_name"' | cut -d'"' -f4)"
      version="${tag#v}"

      case "$CRAFT_ARCH_BUILD_FOR" in
        amd64) asset="doma-${tag}-linux-x86_64" ;;
        arm64) asset="doma-${tag}-linux-arm64" ;;
        *) echo "unsupported arch: $CRAFT_ARCH_BUILD_FOR" >&2; exit 1 ;;
      esac

      mkdir -p "$CRAFT_PART_INSTALL/bin"
      curl -fsSL --retry 5 --retry-delay 5 \
        "https://github.com/hahwul/doma/releases/download/${tag}/${asset}" \
        -o "$CRAFT_PART_INSTALL/bin/doma"
      chmod +x "$CRAFT_PART_INSTALL/bin/doma"

      craftctl set version="$version"
