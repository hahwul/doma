name: doma
base: core24
version: 0.1.0
summary: Directory tag manager — put your directories on the cutting board.
description: |
  doma (도마) is a directory tag manager written in Crystal. Tag any path
  with one or more labels and recall, browse, or batch-execute commands
  across them — a single SQLite-backed CLI with optional fzf integration.

grade: stable
confinement: strict
license: MIT

apps:
  doma:
    command: doma
    plugs:
      - home
      - removable-media
      - network
      - network-bind

parts:
  doma:
    source: ./
    plugin: nil
    override-build: |
      curl -fsSL https://crystal-lang.org/install.sh | bash
      shards install --production
      shards build --release --no-debug --production
      cp ./bin/doma $CRAFT_PART_INSTALL/
    build-packages:
      - git
      - curl
      - pkg-config
      - libssl-dev
      - libxml2-dev
      - libz-dev
      - libyaml-dev
      - libpcre2-dev
      - libevent-dev
      - libgmp-dev
      - libsqlite3-dev
    stage-packages:
      - libxml2
      - zlib1g
      - libyaml-0-2
      - libsqlite3-0
